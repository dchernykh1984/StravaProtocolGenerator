name: build

# Portable, self-contained builds. Users download one file for their platform
# and run it - no Python/uv/git needed. Data lives next to the program.
#
# On a pull request only a Linux x64 smoke build runs (fast, cheap). The full
# platform matrix runs when a release is published and the artifacts are
# attached to that GitHub Release.

on:
  pull_request:
  release:
    types: [published]

# Cancel superseded pull-request builds, but never interrupt a release build.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  APP_NAME: StravaProtocolGenerator

jobs:
  targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          full='{"include":[{"os":"ubuntu-22.04","name":"linux-x86_64"},{"os":"ubuntu-22.04-arm","name":"linux-aarch64"},{"os":"windows-latest","name":"windows-x64"},{"os":"windows-11-arm","name":"windows-arm64"},{"os":"macos-13","name":"macos-x86_64"},{"os":"macos-14","name":"macos-arm64"}]}'
          smoke='{"include":[{"os":"ubuntu-22.04","name":"linux-x86_64"}]}'
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "matrix=$full" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$smoke" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: targets
    permissions:
      contents: write # attach assets to the release
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.targets.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libxcb-cursor0

      - name: Install dependencies
        run: uv sync

      - name: Build portable app
        shell: bash
        run: |
          set -euo pipefail
          sep=":"; [ "$RUNNER_OS" = "Windows" ] && sep=";"
          common=(--noconfirm --windowed --name "$APP_NAME" \
                  --collect-submodules app --add-data "app/app.ico${sep}app")
          if [ "$RUNNER_OS" = "macOS" ]; then
            uv run --with pyinstaller pyinstaller "${common[@]}" app/main.py
            ( cd dist && zip -r -y "${APP_NAME}-${{ matrix.name }}.zip" "${APP_NAME}.app" )
            echo "ASSET=dist/${APP_NAME}-${{ matrix.name }}.zip" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            uv run --with pyinstaller pyinstaller --onefile --icon app/app.ico "${common[@]}" app/main.py
            mv "dist/${APP_NAME}.exe" "dist/${APP_NAME}-${{ matrix.name }}.exe"
            echo "ASSET=dist/${APP_NAME}-${{ matrix.name }}.exe" >> "$GITHUB_ENV"
          else
            uv run --with pyinstaller pyinstaller --onefile "${common[@]}" app/main.py
            mv "dist/${APP_NAME}" "dist/${APP_NAME}-${{ matrix.name }}"
            echo "ASSET=dist/${APP_NAME}-${{ matrix.name }}" >> "$GITHUB_ENV"
          fi

      - name: Verify the artifact was produced
        shell: bash
        run: test -s "$ASSET"

      - name: Smoke-launch the frozen app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # Actually start the bundled app headlessly to catch broken bundling
          # (e.g. a missing hidden import) that "file exists" would not.
          set +e
          timeout 20 "$ASSET"
          code=$?
          set -e
          # 124 = still running after the timeout (started fine); 0 = clean exit.
          if [ "$code" != "124" ] && [ "$code" != "0" ]; then
            echo "Frozen app failed to start (exit $code)"
            exit 1
          fi
          echo "Frozen app started cleanly."

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      - name: Attach to release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ASSET" --clobber
